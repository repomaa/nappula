name: Deploy to StaticHost

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run checks
        run: |
          bun run check
          bun run lint

      - name: Trigger StaticHost deployment
        run: |
          curl -X POST "https://builder.statichost.eu/${{ secrets.STATICHOST_SITE_NAME }}" \
            -H "Content-Type: application/json" \
            --fail
        env:
          STATICHOST_SITE_NAME: ${{ secrets.STATICHOST_SITE_NAME }}
